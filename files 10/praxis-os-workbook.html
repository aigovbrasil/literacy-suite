<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {

  flex-direction: column;
  align-items: center;
  gap: 48px;

}
.a4-page {
  width: 210mm;

  overflow: hidden;
  flex-shrink: 0;
}
svg.page-svg {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0; left: 0;
}
.print-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #666;
  letter-spacing: 1px;
  margin-bottom: -24px;
}
@page { size: A4; margin: 0; }
@media print {
  body { background: none; padding: 0; gap: 0; display: block; }
  .a4-page { box-shadow: none; break-after: page; width: 210mm; height: 297mm; }
